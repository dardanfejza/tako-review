# Off-box dead-man for the droplet-hosted monitoring stack.
#
# Everything else that watches <your-domain> runs ON the
# droplet (Prometheus, Grafana, blackbox exporter) -- if the droplet, Caddy,
# or TLS dies, the on-box monitor dies with it and the dashboard simply goes
# unreachable. This workflow probes from GitHub's infrastructure instead, so
# total-box death produces a failed run and GitHub's built-in "workflow
# failed" notification to the repo owner. No secrets, read-only GETs only.
#
# NOTE: scheduled workflows only run once the repo is pushed to GitHub (and
# on the default branch); GitHub may also delay */30 schedules by a few
# minutes under load, and auto-disables schedules after 60 days without
# repo activity -- a manual workflow_dispatch run re-arms it.
#
# TODO: replace <your-domain> below with your deployed domain once redeployed
# (this workflow will fail every run until you do).
name: uptime

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: SPA root responds
        run: curl -fsS --max-time 30 https://<your-domain>/ >/dev/null

      - name: API health reports ok + db_ok
        run: |
          curl -fsS --max-time 30 https://<your-domain>/api/health \
            | python3 -c 'import json,sys;d=json.load(sys.stdin);assert d["status"]=="ok" and d["db_ok"]'
